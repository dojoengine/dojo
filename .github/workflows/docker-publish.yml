name: release

on:
  release:
    types: [published]

jobs:
  docker-build-and-push:
    runs-on: ubuntu-20.04-4-cores

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version number from release tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          DOJO_VERSION=${TAG_NAME#v}
          echo "DOJO_VERSION=$DOJO_VERSION" >> $GITHUB_ENV

      - name: Build and push docker image (preview)
        if: ${{ contains(needs.prepare.outputs.tag_name, 'preview') }}
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag_name }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOJO_VERSION=${{ env.DOJO_VERSION }}

      - name: Build and push docker image
        if: ${{ !contains(needs.prepare.outputs.tag_name, 'preview') }}
        uses: docker/build-push-action@v3
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:latest,ghcr.io/${{ github.repository }}:${{ needs.prepare.outputs.tag_name }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOJO_VERSION=${{ env.DOJO_VERSION }}
